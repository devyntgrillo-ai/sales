document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mat('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f818c94d-537b-48ad-be11-21575ed5a5ad\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"b6895eb4-7ad7-494d-b9f2-950184a48796\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"bdcfe8a8-b03b-4ed9-898b-d708a983b0ad\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"fffacd59-7a29-4775-8ded-59755f4b35cd\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f818c94d-537b-48ad-be11-21575ed5a5ad\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"474df3f8-23ec-4890-9098-c2d1db58dbae\"><\u002Fscript>\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Let the slide breathe. Introduce yourself simply: We built this specifically for your practice, not a generic deck. Then pause. Let them settle in. Your calm here sets the frame for everything that follows. PRESENTER TIP: Do not rush Slide 1. Give them 10 full seconds before you speak. Silence reads as confidence.\",\n  \"Keep this tight. Devyn built and sold a 7-figure dental marketing agency. Before the exit, he personally hired 13 front desk reps and coached TCs in over 150 practices. He has managed $3M in implant ad spend and closed $2M in high-ticket dental sales himself — not in simulations, in real rooms with real patients. Beau runs client growth. Dr. Greg Grillo brings clinical credibility. Together we built exactly what we are about to show you, because we had seen what was missing everywhere we looked. PRESENTER TIP: If they seem skeptical — We did not have to do this, we had a great exit. We did it because this problem is unsolved and we are the only team built to solve it.\",\n  \"Open with the question directly. Let them answer. Most say 20-30%. Then: Let me show you what the industry actually looks like. Do not tell them. Make them feel it first. PRESENTER TIP: Silence before the next slide is your friend. Let the question hang in the air.\",\n  \"Walk through each number slowly. Pause on 2. That means 97-98 out of every 100 leads you paid for never converted. That is not always a marketing problem. That is a conversion problem. Do not explain yet. Just let the number land. PRESENTER TIP: The goal here is to create discomfort, not educate. Make them feel the gap before you name the gap.\",\n  \"Just let this land. Say it simply: 97 cents of every dollar you put into marketing never reaches the chair. Then pause for 5-7 full seconds. PRESENTER TIP: Do not rush to the solution. The longer they sit with this number, the easier the close.\",\n  \"Point to the gap. Who owns what happens after the lead comes in? Who scripts the call? Who makes sure they show up? Who coaches your TC to close? In most practices: nobody. Pause after 'nobody.' PRESENTER TIP: Use 'nobody owns it' — specific and visceral. Watch them nod. They have felt this without having a name for it.\",\n  \"Let this land the same way. Say it plainly and stop talking. Then: The good news is — this is fixable. And you don't need to spend another dollar on ads to do it. PRESENTER TIP: The dramatic shift from problem to solution should feel like a breath of fresh air. Pause, then move forward with energy.\",\n  \"Walk the two columns slowly. These are the same 100 leads. Same ad spend. Same doctor. The only difference is what happens after the lead comes in. Let the gap number sit for a moment before moving on. PRESENTER TIP: Do not rush to the solution. Let them feel the math.\",\n  \"INTERACTIVE — enter their actual numbers as they tell you. What is your monthly lead volume? And roughly what percentage actually schedule? Enter it live. When the annual gap appears, stop talking. Let them read it. Then: That number is what is sitting uncollected in your pipeline right now. Not hypothetically — you already paid to generate those leads. If they do not know their numbers, use: 80 leads, 22% book, 62% show, 18% accept, $16,240 case value. PRESENTER TIP: The calculator does the selling. Your job is to enter numbers and stay quiet when the gap appears.\",\n  \"Click through each stage as you name it. Most agencies stop at the lead, because that is where their contract ends. We start there too, but we own everything downstream. Then ask: Which stage do you feel you are losing the most in? Write down what they say. You will come back to it at the close. PRESENTER TIP: The diagnostic question is your close setup. Whatever they name, that becomes your opening move Day 1.\",\n  \"Walk through the three months as a compounding story. Month 1 is about quick wins — we diagnose, we run the reactivation blast, we get the first dollars recovered from leads already in your database. Most practices see $15k to $40k in that first 30 days before we've even fully installed the systems. Month 2 is where the real compounding starts. Your TC is certified. Your close rate moves 10 to 15 points. Month 3 we lock it all in. SOPs, playbooks, case value optimization. PRESENTER TIP: The progression from Quick Win → Compound → Lock In mirrors how they'll experience the program.\",\n  \"Tell this as a story: Already running ads, already getting leads. Installed the system. Same leads — $110k in new production in 4 months. PRESENTER TIP: Match the case study to their situation. If they are worried about speed of ROI, lead with Devin on the next slide.\",\n  \"Devin: First month. Closed a husband and wife, two cases. $65,000. He called just to tell us. Dr. Will: 9 consults in 45 days. Nearly every one converted. That is a scripted, coached TC experience. PRESENTER TIP: Every single one of these practices was already running paid ads before we walked in.\",\n  \"Deliver this slowly. Let the bold numbers do the work. We guarantee $50,000 in new implant revenue within 90 days. Pause. Our average client adds $110,000+ in the same window. The $50k is the floor. Not the ceiling. If we miss, we work free until you hit it. PRESENTER TIP: The gap between what you guarantee and what you typically deliver is your strongest closing line. Say both numbers, then go silent.\",\n  \"Keep this light. Don't over-explain. 'To put the guarantee in writing, we need three things from you.' Walk the numbers: 25+ consults a month, 50+ unconverted treatment plans, 10+ full-arch consults a year. Then the soft landing: 'Don't check every box? You can still join. We just can't put the guarantee in writing.' Don't dwell. Move on.\",\n  \"We work inside a limited number of practices at a time to maintain our standard. Right now we have one spot left. That's not a marketing tactic — it's because we're inside your practice every week and we maintain quality standards. Pause. Let them sit with it. PRESENTER TIP: Urgency only works when it feels real. Deliver this like you're stating a fact.\",\n  \"Walk the deliverables list first. Add up the values as you go — $35,500 over 90 days if they tried to hire all this separately. Then switch the tab to show pricing. $10,000 paid in full, or $3,500 a month for 3 months. No setup fees. Pause. Then stop talking. PRESENTER TIP: Lead with PIF. The first person to speak after the price loses. Do not fill the silence — it is working for you.\",\n  \"Walk this left to right. Sign the agreement now. Days 1–2 we handle onboarding and integrations. Day 5 we have our kickoff call and lock in your baseline. Days 3 through 12 we install everything before revenue campaigns launch. Day 14 your first reactivation campaign goes live. Day 21 you receive your Full Practice Audit. Everything ready in 2 weeks. Revenue flowing by Week 3. PRESENTER TIP: This slide answers the 'why can't we just start blasting on Day 1' objection before it gets asked.\",\n  \"This is your strongest differentiator. Most agencies create dependency — the moment you stop paying, results stop. We're the opposite. Everything we install stays with you. Forever. At Day 90, you pick your path. Growth, Maintenance, or Graduate. PRESENTER TIP: Lead with the Graduate Path. Saying 'we're willing to let you walk away' builds more trust than any price justification.\",\n  \"Leave this slide up while you handle questions. If they are ready: Great, I will send the payment link over now. Keep it clean. If hesitant: What is the one thing that would make this a clear yes? Listen. Address it directly. PRESENTER TIP: The best close is quiet. After you answer their final question, stop talking. The silence is working for you.\"\n]\n<\u002Fscript>\n\n<style>\n:root {\n  --ink: #0d0f12;\n  --slate: #1e2530;\n  --steel: #2d3a4a;\n  --mid: #4a5568;\n  --muted: #718096;\n  --gold: #1e40af;\n  --accent: #c8d8e8;\n  --white: #f7f9fb;\n  --ldark: #111827;\n  --lmid: #374151;\n  --lgray: #6b7280;\n  /* accent — TII steel blue */\n  --blue: #1d4ed8;\n  --blue2: #2563eb;\n  --blue3: #3b82f6;\n  /* semantic */\n  --green: #15803d;\n  --red: #dc2626;\n  --font: 'Plus Jakarta Sans', system-ui, sans-serif;\n  --serif: 'Cormorant', Georgia, serif;\n}\n*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n\n/* ── SLIDE BASE ── */\nsection {\n  width: 1920px; height: 1080px;\n  font-family: var(--font);\n  -webkit-font-smoothing: antialiased;\n  display: flex; flex-direction: column; justify-content: center;\n  padding: 90px 120px;\n  position: relative; overflow: hidden;\n}\nsection.dark {\n  background: radial-gradient(ellipse at 30% 40%, #1a2a3a 0%, #0a0c0f 55%, #0d0f14 100%);\n  color: var(--white);\n}\nsection.light { background: #fff; color: var(--ldark); }\n\n/* ── TYPOGRAPHY ── */\n.eyebrow {\n  font-size: 24px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase;\n  color: var(--blue2); margin-bottom: 18px;\n  display: flex; align-items: center; gap: 10px;\n}\n.eyebrow::before { content: ''; width: 20px; height: 1px; background: var(--blue2); display: block; flex-shrink: 0; }\n.headline { font-weight: 800; font-size: 80px; line-height: 1.02; letter-spacing: -.04em; margin-bottom: 20px; color: var(--ldark); }\n.headline-sm { font-size: 64px; }\n.headline-xl { font-size: 96px; }\n.dark .headline { color: var(--white); }\n.em { font-family: var(--serif); font-weight: 400; font-style: italic; color: var(--blue); font-size: 1.05em; letter-spacing: -.01em; }\n.dark .em { color: var(--gold); }\n.sub-line { font-size: 28px; color: var(--lgray); line-height: 1.65; margin-bottom: 28px; max-width: 820px; }\n\n/* ── BG DECOR ── */\n.bg-grid {\n  position: absolute; inset: 0; pointer-events: none; z-index: 0;\n  background-image: linear-gradient(rgba(255,255,255,.016) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px);\n  background-size: 80px 80px;\n  mask-image: radial-gradient(ellipse at 35% 50%, black 15%, transparent 70%);\n}\n.bg-glow {\n  position: absolute; top: -280px; right: -280px; width: 700px; height: 700px;\n  border-radius: 50%; background: radial-gradient(ellipse, rgba(45,58,74,.55) 0%, transparent 70%);\n  pointer-events: none; z-index: 0;\n}\n.z1 { position: relative; z-index: 1; }\n\n/* ── HERO SLIDE ── */\n.hero-wrap { display: flex; flex-direction: column; gap: 32px; align-items: center; text-align: center; width: 100%; }\n.hero-logo { height: 90px; width: auto; display: block; object-fit: contain; }\n.hero-rule { height: 1px; background: linear-gradient(90deg, transparent, rgba(138,164,190,.4), transparent); width: 55%; }\n.hero-headline { font-weight: 800; font-size: 88px; line-height: 1.02; letter-spacing: -.045em; color: var(--white); }\n.hero-sub { font-size: 36px; font-weight: 400; font-style: italic; font-family: var(--serif); color: rgba(255,255,255,.6); margin-top: 10px; letter-spacing: .06em; }\n\n/* ── BIG STAT ── */\n.big-solo { display: flex; flex-direction: column; gap: 24px; max-width: 900px; }\n.big-solo-num { font-size: 144px; font-weight: 800; color: var(--blue); letter-spacing: -.05em; line-height: 1; }\n.big-solo-label { font-size: 36px; color: var(--lgray); line-height: 1.5; max-width: 760px; }\n\n/* ── STAT ROW ── */\n.big-stat-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-top: 20px; }\n.bsr-item { padding: 28px 36px; border: 1px solid #e5e7eb; }\n.bsr-red { border-color: #fca5a5; background: #fff1f2; }\n.bsr-neutral { background: #f9fafb; }\n.bsr-num { font-size: 56px; font-weight: 800; color: var(--ldark); letter-spacing: -.025em; line-height: 1; margin-bottom: 10px; }\n.bsr-lbl { font-size: 24px; color: var(--lgray); line-height: 1.45; font-weight: 500; }\n.bsr-sep { font-size: 40px; color: #d1d5db; font-weight: 200; }\n\n/* ── GAP VISUAL ── */\n.gap-visual { display: grid; grid-template-columns: 1fr auto 1fr; gap: 32px; align-items: center; margin-top: 20px; }\n.gvc-head { font-size: 24px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--lgray); margin-bottom: 16px; }\n.gvc-head-blue { color: var(--blue); }\n.gvc-head-red { color: #b91c1c; }\n.gvc-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }\n.gvc-item { font-size: 26px; padding: 16px 22px; border-radius: 3px; line-height: 1.4; }\n.gvc-check { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; font-weight: 500; }\n.gvc-miss  { background: #fff1f2; color: #b91c1c; border: 1px solid #fca5a5; font-weight: 500; }\n.gvc-stop { font-size: 24px; font-weight: 800; color: var(--red); letter-spacing: .06em; text-transform: uppercase; padding: 12px 18px; background: #fee2e2; border: 1px solid #fca5a5; text-align: center; }\n.gvc-divider { display: flex; flex-direction: column; align-items: center; gap: 12px; }\n.gvc-div-line { width: 1px; height: 80px; background: #d1d5db; }\n.gvc-div-label { font-size: 24px; font-weight: 800; letter-spacing: .15em; color: #9ca3af; text-transform: uppercase; padding: 8px 12px; border: 1px solid #d1d5db; background: #f9fafb; }\n\n/* ── COMPARISON TABLE ── */\n.comp-table { border: 1px solid rgba(255,255,255,.1); overflow: hidden; max-width: 1100px; margin-top: 28px; }\n.comp-table-head { display: grid; grid-template-columns: 2fr 1fr 1fr; background: rgba(255,255,255,.06); border-bottom: 2px solid rgba(255,255,255,.12); }\n.cth-cell { padding: 16px 24px; font-size: 24px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.3); }\n.cth-cell-blue { color: var(--gold); }\n.cth-cell + .cth-cell { border-left: 1px solid rgba(255,255,255,.08); }\n.comp-row nimation: gp 2s ease-in-out infinite; }\n@keyframes gp { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.82)} }\n@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }\n\n/* ── INV TOGGLE ── */\nbutton.inv-toggle-btn {\n  padding: 16px 20px; border: none; font-family: var(--font);\n  font-size: 24px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: all .2s;\n}\n\n/* ── CHEVRON NAV ── */\n.chev-step { display: flex; flex-direction: column; align-items: center; }\n.chev-label { font-size: 26px; font-weight: 800; color: var(--ldark); line-height: 1.2; text-align: center; margin-top: 24px; letter-spacing: -.015em; }\n\n/* ── CLOSE BUTTON ── */\n.close-btn {\n  display: inline-flex; align-items: center;\n  font-family: var(--font); font-size: 28px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;\n  padding: 28px 72px; text-decoration: none; border-radius: 2px;\n  background: var(--white); color: var(--ink); transition: background .15s, transform .15s;\n}\n.close-btn:hover { background: var(--accent); transform: translateY(-3px); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- ═══════════════════════════════════════════ 01 HERO -->\n<section class=\"dark\" data-label=\"01 Hero\">\n  <div class=\"bg-grid\"><\u002Fdiv><div class=\"bg-glow\"><\u002Fdiv>\n  <div class=\"hero-wrap z1\">\n    <img src=\"d4f18384-10d0-4569-b4e7-6d6651eea2aa\" class=\"hero-logo\" alt=\"The Implant Initiative\">\n    <div class=\"hero-rule\"><\u002Fdiv>\n    <div class=\"hero-headline\">How Your Practice Can Add<br>$300k–$1M / Year…<div class=\"hero-sub\" style=\"font-size:48px;\">Without Spending More on Marketing<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════ 02 WHO WE ARE -->\n<section class=\"light\" data-label=\"02 Who We Are\">\n  <div class=\"z1\" style=\"display:grid;grid-template-columns:480px 1fr;gap:80px;align-items:center;height:100%;\">\n    <!-- Photo -->\n    <div style=\"position:relative;\">\n      <img src=\"38d88dc2-d392-4ec5-b1f6-a30e8079fe44\" style=\"width:480px;height:580px;object-fit:cover;object-position:center top;display:block;filter:grayscale(15%) contrast(1.05);\">\n      <!-- Gold border accent -->\n      <div style=\"position:absolute;bottom:-16px;right:-16px;width:100%;height:100%;border:2px solid rgba(138,164,190,.25);pointer-events:none;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Content -->\n    <div style=\"display:flex;flex-direction:column;gap:44px;\">\n      <!-- Headline -->\n      <div>\n        <div class=\"eyebrow\">The Team<\u002Fdiv>\n        <h2 class=\"headline headline-sm\" style=\"color:var(--ldark);margin-bottom:12px;\">Built by people who<br><span class=\"em\">did the work.<\u002Fspan><\u002Fh2>\n        <p style=\"font-size:28px;color:#6b7280;line-height:1.6;max-width:620px;\">Not consultants. Former operators — who built, ran, and sold a 7-figure implant marketing agency before launching this.<\u002Fp>\n      <\u002Fdiv>\n      <!-- Credential stats -->\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:2px;background:#e5e7eb;\">\n        <div style=\"background:#f9fafb;padding:28px 32px;\">\n          <div style=\"font-size:56px;font-weight:800;color:#1e40af;letter-spacing:-.04em;line-height:1;\">150+<\u002Fdiv>\n          <div style=\"font-size:24px;color:#6b7280;margin-top:6px;\">Implant practices worked with<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f9fafb;padding:28px 32px;\">\n          <div style=\"font-size:56px;font-weight:800;color:#1e40af;letter-spacing:-.04em;line-height:1;\">$3M+<\u002Fdiv>\n          <div style=\"font-size:24px;color:#6b7280;margin-top:6px;\">Implant ad spend managed<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f9fafb;padding:28px 32px;\">\n          <div style=\"font-size:56px;font-weight:800;color:#1e40af;letter-spacing:-.04em;line-height:1;\">$2M<\u002Fdiv>\n          <div style=\"font-size:24px;color:#6b7280;margin-top:6px;\">High-ticket dental sales closed personally<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#f9fafb;padding:28px 32px;\">\n          <div style=\"font-size:56px;font-weight:800;color:#1e40af;letter-spacing:-.04em;line-height:1;\">7-fig<\u002Fdiv>\n          <div style=\"font-size:24px;color:#6b7280;margin-top:6px;\">Agency built &amp; sold at exit<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Team -->\n      <div style=\"display:flex;flex-direction:column;gap:0;border-top:1px solid #e5e7eb;\">\n        <div style=\"display:flex;align-items:center;gap:20px;padding:18px 0;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;\"><\u002Fdiv>\n          <div><span style=\"font-size:26px;font-weight:700;color:var(--ldark);\">Devyn Grillo<\u002Fspan> <span style=\"font-size:24px;color:#1e40af;font-weight:600;margin-left:12px;\">Founder &amp; CEO<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:20px;padding:18px 0;border-bottom:1px solid #f1f5f9;\">\n          <div style=\"width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;\"><\u002Fdiv>\n          <div><span style=\"font-size:26px;font-weight:700;color:var(--ldark);\">Beau<\u002Fspan> <span style=\"font-size:24px;color:#1e40af;font-weight:600;margin-left:12px;\">Client Growth &amp; Fulfillment<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:20px;padding:18px 0;\">\n          <div style=\"width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;\"><\u002Fdiv>\n          <div><span style=\"font-size:26px;font-weight:700;color:var(--ldark);\">Dr. Greg Grillo DDS<\u002Fspan> <span style=\"font-size:24px;color:#1e40af;font-weight:600;margin-left:12px;\">Dental Consultant<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════ 03 PROBLEM QUESTION -->\n<section class=\"light\" data-label=\"03 The Problem\">\n  <h2 class=\"headline\" style=\"max-width:1200px;\">Of every 100 leads your marketing generates…<br><span class=\"em\">how many become cases?<\u002Fspan><\u002Fh2>\n  <p class=\"sub-line\" style=\"font-size:32px;margin-top:16px;\">Most practices don't know...<\u002Fp>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════ 04 FUNNEL STATS -->\n<section class=\"light\" data-label=\"04 Funnel Stats\">\n  <h2 class=\"headline headline-sm\">Here's what the averages look like<br>for <span class=\"em\">100 leads.<\u002Fspan><\u002Fh2>\n  <div class=\"big-stat-row\">\n    <div class=\"bsr-item bsr-neutral\"><div class=\"bsr-num\">100<\u002Fdiv><div class=\"bsr-lbl\">Leads from<br>your marketing<\u002Fdiv><\u002Fdiv>\n    <div class=\"bsr-sep\">→<\u002Fdiv>\n    <div class=\"bsr-item bsr-neutral\"><div class=\"bsr-num\">22<\u002Fdiv><div class=\"bsr-lbl\">Book a consult<br><span style=\"color:#9ca3af;font-size:24px;\">22% book rate<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"bsr-sep\">→<\u002Fdiv>\n    <div class=\"bsr-item bsr-neutral\"><div class=\"bsr-num\">14<\u002Fdiv><div class=\"bsr-lbl\">Actually show up<br><span style=\"color:#9ca3af;font-size:24px;\">62% show rate<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"bsr-sep\">→<\u002Fdiv>\n    <div class=\"bsr-item bsr-red\"><div class=\"bsr-num\" style=\"color:var(--red);\">2<\u002Fdiv><div class=\"bsr-lbl\">Cases accepted<br><span style=\"color:#9ca3af;font-size:24px;\">18% accept rate<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════ 05 97% -->\n<section class=\"light\" data-label=\"05 97% Wasted\">\n  <div class=\"big-solo\">\n    <div class=\"big-solo-num\">97%<\u002Fdiv>\n    <div class=\"big-solo-label\">of the money you spend on marketing<br>is being <strong style=\"color:var(--red);\">wasted.<\u002Fstrong><\u002Fdiv>\n    <p style=\"font-size:26px;color:var(--lgray);border-left:4px solid #fca5a5;padding-left:24px;\">That is not a marketing problem. That is a conversion problem.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════ 06 THE GAP -->\n<section class=\"light\" data-label=\"06 The Gap\">\n  <h2 class=\"headline headline-sm\">Your marketing agency doesn't fix<br>the <span class=\"em\">backend.<\u002Fspan><\u002Fh2>\n  <div class=\"gap-visual\">\n    <div>\n      <div class=\"gvc-head gvc-head-blue\">✓ &nbsp;The Front End — Your Agency<\u002Fdiv>\n      <div class=\"gvc-items\">\n        <div class=\"gvc-item gvc-check\">✓ &nbsp;Ad creative &amp; targeting<\u002Fdiv>\n        <div class=\"gvc-item gvc-check\">✓ &nbsp;Lead generation<\u002Fdiv>\n        <div class=\"gvc-item gvc-check\">✓ &nbsp;Landing pages<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"gvc-stop\">AGENCY STOPS HERE<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"gvc-divider\"><div class=\"gvc-div-line\"><\u002Fdiv><div class=\"gvc-div-label\">THE GAP<\u002Fdiv><div class=\"gvc-div-line\"><\u002Fdiv><\u002Fdiv>\n    <div>\n      <div class=\"gvc-head gvc-head-red\">✗ &nbsp;The Backend — Nobody Owns This<\u002Fdiv>\n      <div class=\"gvc-items\">\n        <div class=\"gvc-item gvc-miss\">✗ &nbsp;Phone scripting &amp; intake<\u002Fdiv>\n        <div class=\"gvc-item gvc-miss\">✗ &nbsp;Show rate optimization<\u002Fdiv>\n        <div class=\"gvc-item gvc-miss\">✗ &nbsp;Consultation framework<\u002Fdiv>\n        <div class=\"gvc-item gvc-miss\">✗ &nbsp;TC training &amp; case acceptance<\u002Fdiv>\n        <div class=\"gvc-item gvc-miss\">✗ &nbsp;Follow-up sequences<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════ Practice<br>Audit<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════ 19 AFTER DAY 90 -->\n<section class=\"light\" data-label=\"20 After Day 90\">\n  <div class=\"eyebrow\">After Day 90<\u002Fdiv>\n  <h2 class=\"headline headline-sm\">You keep everything. <span class=\"em\">You choose what's next.<\u002Fspan><\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:36px;margin-top:36px;\">\n    <div style=\"border:1px solid rgba(138,164,190,.3);background:#eff6ff;padding:44px 36px;text-align:center;\">\n      <div style=\"width:64px;height:64px;border:2px solid rgba(138,164,190,.5);border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;background:#fff;\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12l7-7 7 7M12 5v14\" stroke=\"#1d4ed8\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#1e40af;margin-bottom:20px;\">Growth Path<\u002Fdiv>\n      <div style=\"font-size:28px;color:var(--lmid);line-height:1.5;\">We take over your marketing and keep scaling.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #e5e7eb;background:#f9fafb;padding:44px 36px;text-align:center;\">\n      <div style=\"width:64px;height:64px;border:2px solid #475569;border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;background:#fff;\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\" stroke=\"#475569\" stroke-width=\"2.5\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#475569;margin-bottom:20px;\">Maintenance<\u002Fdiv>\n      <div style=\"font-size:28px;color:var(--lmid);line-height:1.5;\">Monthly coaching to maintain your growth.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border:1px solid #86efac,.4);background:#f0fdf4;padding:44px 36px;text-align:center;\">\n      <div style=\"width:64px;height:64px;border:2px solid rgba(94,204,138,.5);border-radius:8px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;background:#fff;\"><svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M22 10v6M2 10l10-5 10 5-10 5-10-5z\" stroke=\"#15803d\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-size:24px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#15803d;margin-bottom:20px;\">Graduate<\u002Fdiv>\n      <div style=\"font-size:28px;color:var(--lmid);line-height:1.5;\">Take the playbook and run.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:48px;text-align:center;\">\n    <p style=\"font-family:var(--serif);font-style:italic;font-size:36px;color:var(--lmid);line-height:1.5;max-width:960px;margin:0 auto;\">This isn't marketing... it's <strong style=\"color:var(--blue);font-style:normal;\">permanent infrastructure.<\u002Fstrong><\u002Fp>\n    <p style=\"font-size:24px;color:var(--lgray);margin-top:14px;\">Every system, script, and trained team member stays with your practice. Forever.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════════════════════════════════ 20 CLOSE -->\n<section class=\"dark\" data-label=\"21 Close\">\n  <div class=\"bg-grid\"><\u002Fdiv><div class=\"bg-glow\"><\u002Fdiv>\n  <div class=\"z1\" style=\"text-align:center;display:flex;flex-direction:column;align-items:center;\">\n    <h2 style=\"font-family:var(--font);font-weight:800;font-size:96px;line-height:1.02;letter-spacing:-.045em;color:var(--white);margin-bottom:.5rem;\">Ready to grow your<br><span style=\"color:var(--gold);\">implant production?<\u002Fspan><\u002Fh2>\n    <p style=\"font-size:28px;color:rgba(255,255,255,.5);line-height:1.7;margin-bottom:52px;max-width:700px;\">One spot. No setup fee. Month-to-month. The only question is whether your practice will be the one that fills it.<\u002Fp>\n    <a href=\"https://app.squareup.com/dashboard/take-payment\" target=\"_blank\" class=\"close-btn\">Let's Get Started →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fdeck-stage>\n\n<script>\n/* ── CALCULATOR ── */\nfunction calcUpdate() {\n  var leads = +document.getElementById('sl-leads').value;\n  var book  = +document.getElementById('sl-book').value / 100;\n  var show  = +document.getElementById('sl-show').value / 100;\n  var acc   = +document.getElementById('sl-acc').value / 100;\n  var cv    = +document.getElementById('sl-case').value;\n\n  // If already above TII benchmark, apply a modest relative boost only\n  function tiiRate(cur, bench, cap) {\n    return cur < bench\n      ? Math.min(bench + 0.04, cap)      // below bench → lift to bench + 4pts\n      : Math.min(cur * 1.06, cap);        // above bench → 6% relative improvement\n  }\n  var bA = tiiRate(book, 0.31, 0.55);\n  var sA = tiiRate(show, 0.72, 0.88);\n  var aA = tiiRate(acc,  0.28, 0.45);\n\n  var closed  = leads * book * show * acc;\n  var closedA = leads * bA   * sA   * aA;\n\n  var gain = (closedA - closed) * 12 * cv;\n\n  function T(id, v) { var e = document.getElementById(id); if (e) e.textContent = v; }\n  T('v-leads', leads);\n  T('v-book',  document.getElementById('sl-book').value);\n  T('v-show',  document.getElementById('sl-show').value);\n  T('v-acc',   document.getElementById('sl-acc').value);\n  T('v-case',  Number(cv).toLocaleString());\n\n  var cR  = Math.round(closed  * 10) / 10;\n  var cAR = Math.round(closedA * 10) / 10;\n  T('r-now-cases', cR  + ' case' + (cR  !== 1 ? 's' : '') + '/mo');\n  T('r-now-prod',  '$' + Number(Math.round(closed  * cv)).toLocaleString() + '/mo');\n  T('r-tii-cases', cAR + ' cases/mo');\n  T('r-tii-prod',  '$' + Number(Math.round(closedA * cv)).toLocaleString() + '/mo');\n\n  var fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });\n  T('result-num', fmt.format(Math.max(0, gain)));\n  T('result-sub', '+' + (Math.round((closedA - closed) * 10) / 10) + ' cases/mo from existing leads');\n  T('f-booked', Math.round(leads * book)            + ' consults');\n  T('f-shows',  Math.round(leads * book * show)     + ' patients');\n  T('f-closed', Math.round(closed)                  + ' cases');\n}\n['sl-leads','sl-book','sl-show','sl-acc','sl-case'].forEach(function(id) {\n  var el = document.getElementById(id);\n  if (el) el.addEventListener('input', calcUpdate);\n});\ncalcUpdate();\n\n/* ── SYSTEM TABS ── */\nfunction selStage(idx) {\n  for (var i = 0; i < 5; i++) {\n    var tab = document.getElementById('sys-tab-' + i);\n    var bar = document.getElementById('sys-bar-' + i);\n    var fd  = document.getElementById('fd-' + i);\n    if (tab) {\n      if (i === idx) {\n        tab.style.background   = '#1e40af';\n        tab.style.color        = 'white';\n        tab.style.borderColor  = '#1e40af';\n        tab.querySelector('div:first-child').style.color = 'rgba(255,255,255,.8)';\n      } else {\n        tab.style.background   = '#fff';\n        tab.style.color        = 'var(--ldark)';\n        tab.style.borderColor  = '#e5e7eb';\n        tab.querySelector('div:first-child').style.color = '#9ca3af';\n      }\n    }\n    if (bar) bar.style.background = i <= idx ? '#1e40af' : '#e5e7eb';\n    if (fd)  fd.style.display     = i === idx ? 'grid'   : 'none';\n  }\n}\nselStage(0);\n\n/* ── PRICING TOGGLE ── */\nfunction invTab(which) {\n  var pTab = document.getElementById('inv-tab-pif');\n  var mTab = document.getElementById('inv-tab-monthly');\n  var pPanel = document.getElementById('inv-panel-pif');\n  var mPanel = document.getElementById('inv-panel-monthly');\n  if (!pTab) return;\n  if (which === 'monthly') {\n    mTab.style.background = '#15803d'; mTab.style.color = 'white';\n    pTab.style.background = '#fff';    pTab.style.color = '#15803d';\n    mPanel.style.display  = 'flex';    pPanel.style.display = 'none';\n  } else {\n    pTab.style.background = '#15803d'; pTab.style.color = 'white';\n    mTab.style.background = '#fff';    mTab.style.color = '#15803d';\n    pPanel.style.display  = 'flex';    mPanel.style.display = 'none';\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
